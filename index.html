<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>探索宇宙帖子</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000000;
            --surface: rgba(20, 20, 25, 0.75);
            --surface-hover: rgba(30, 30, 38, 0.85);
            --text-primary: #f0f0f5;
            --text-secondary: #888899;
            --text-muted: #555566;
            --accent: #e8e8f0;
            --accent-hover: #ffffff;
            --border: rgba(255, 255, 255, 0.06);
            --border-focus: rgba(255, 255, 255, 0.15);
            --danger: #ff5555;
            --gold: #ffd700;
            --gold-hover: #ffe44d;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            line-height: 1.6;
        }

        .bg-image {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('https://i.imglt.com/20260704/3ce40be8ab8646abcedcdae6572a6ae8.png') center/cover no-repeat;
            z-index: 0;
        }

        .bg-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.45);
            z-index: 1;
        }

        .header {
            position: relative;
            z-index: 2;
            text-align: center;
            padding: 60px 20px 30px;
        }

        .header h1 {
            font-size: 2.8rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 10px;
            color: var(--text-primary);
        }

        .header p {
            color: var(--text-secondary);
            font-size: 1rem;
            font-weight: 300;
            letter-spacing: 0.02em;
        }

        .container {
            position: relative;
            z-index: 2;
            max-width: 720px;
            margin: 0 auto;
            padding: 0 20px 60px;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 28px;
        }

        .tabs {
            display: flex;
            gap: 4px;
            padding: 4px;
            background: var(--surface);
            border-radius: 14px;
            border: 1px solid var(--border);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        .tab {
            padding: 10px 20px;
            border: none;
            background: transparent;
            color: var(--text-secondary);
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            border-radius: 10px;
            transition: all 0.25s ease;
            font-family: inherit;
            letter-spacing: 0.01em;
        }

        .tab:hover {
            color: var(--text-primary);
        }

        .tab.active {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-primary);
        }

        .tab .icon {
            margin-right: 6px;
        }

        .fab-post {
            padding: 12px 28px;
            background: var(--gold);
            color: #000;
            border: none;
            border-radius: 14px;
            font-size: 0.92rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s;
            font-family: inherit;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .fab-post:hover {
            background: var(--gold-hover);
            transform: translateY(-1px);
            box-shadow: 0 6px 24px rgba(255, 215, 0, 0.25);
        }

        .fab-post:active {
            transform: translateY(0);
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.65);
            z-index: 100;
            display: none;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            animation: overlayIn 0.25s ease;
        }

        .modal-overlay.show {
            display: flex;
        }

        @keyframes overlayIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal {
            background: #1a1a24;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 36px 32px 32px;
            width: 90%;
            max-width: 480px;
            position: relative;
            animation: modalIn 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes modalIn {
            from { opacity: 0; transform: scale(0.92) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .modal-close {
            position: absolute;
            top: 16px;
            right: 20px;
            background: transparent;
            border: none;
            color: var(--text-muted);
            font-size: 1.4rem;
            cursor: pointer;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: all 0.2s;
        }

        .modal-close:hover {
            color: var(--text-primary);
            background: rgba(255, 255, 255, 0.08);
        }

        .modal-title {
            text-align: center;
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 28px;
            color: var(--text-primary);
        }

        .modal-input {
            width: 100%;
            padding: 14px 18px;
            background: #22222e;
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 14px;
            color: var(--text-primary);
            font-size: 0.95rem;
            font-family: inherit;
            outline: none;
            transition: all 0.25s;
            margin-bottom: 16px;
        }

        .modal-input:focus {
            border-color: var(--border-focus);
            box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.05);
        }

        .modal-input::placeholder {
            color: var(--text-muted);
        }

        .modal-textarea {
            width: 100%;
            min-height: 140px;
            padding: 14px 18px;
            background: #22222e;
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 14px;
            color: var(--text-primary);
            font-size: 0.95rem;
            font-family: inherit;
            outline: none;
            resize: vertical;
            transition: all 0.25s;
            line-height: 1.6;
        }

        .modal-textarea:focus {
            border-color: var(--border-focus);
            box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.05);
        }

        .modal-textarea::placeholder {
            color: var(--text-muted);
        }

        .modal-submit {
            width: 100%;
            padding: 14px;
            background: var(--gold);
            color: #000;
            border: none;
            border-radius: 14px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s;
            font-family: inherit;
            margin-top: 20px;
        }

        .modal-submit:hover {
            background: var(--gold-hover);
            box-shadow: 0 4px 20px rgba(255, 215, 0, 0.2);
        }

        .modal-submit:active {
            transform: scale(0.98);
        }

        .modal-submit:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .posts-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .post-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 24px;
            transition: all 0.3s ease;
            animation: fadeIn 0.4s ease;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .post-card:hover {
            background: var(--surface-hover);
            border-color: var(--border-focus);
        }

        .post-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 14px;
        }

        .post-author {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.08);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            border: 1px solid var(--border);
        }

        .author-info {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .author-name {
            font-size: 0.92rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .post-time {
            font-size: 0.78rem;
            color: var(--text-muted);
        }

        .post-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 8px;
            line-height: 1.4;
        }

        .post-content {
            color: rgba(240, 240, 245, 0.85);
            line-height: 1.75;
            font-size: 0.95rem;
            margin-bottom: 18px;
            white-space: pre-wrap;
            word-break: break-word;
            font-weight: 400;
        }

        .post-footer {
            display: flex;
            gap: 24px;
            padding-top: 14px;
            border-top: 1px solid var(--border);
        }

        .action-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            background: transparent;
            border: none;
            color: var(--text-muted);
            font-size: 0.84rem;
            cursor: pointer;
            transition: all 0.25s;
            font-family: inherit;
            padding: 4px 8px;
            border-radius: 8px;
        }

        .action-btn:hover {
            color: var(--text-secondary);
            background: rgba(255, 255, 255, 0.04);
        }

        .action-btn.liked {
            color: #ff6b6b;
        }

        .action-btn.liked:hover {
            background: rgba(255, 107, 107, 0.08);
        }

        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: var(--text-muted);
        }

        .empty-state .emoji {
            font-size: 3.5rem;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        .empty-state p {
            font-size: 0.95rem;
            font-weight: 300;
        }

        /* 加载提示 */
        .loading {
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        @media (max-width: 600px) {
            .header h1 {
                font-size: 2.2rem;
            }
            .container {
                padding: 0 14px 40px;
            }
            .modal {
                padding: 28px 24px 24px;
                border-radius: 20px;
            }
            .post-card {
                padding: 18px;
                border-radius: 16px;
            }
            .top-bar {
                flex-direction: column;
                gap: 12px;
            }
            .tabs {
                width: 100%;
            }
            .fab-post {
                width: 100%;
                justify-content: center;
            }
        }

        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.18);
        }
    </style>
</head>
<body>
    <div class="bg-image"></div>
    <div class="bg-overlay"></div>

    <header class="header">
        <h1>探索宇宙帖子</h1>
        <p>连接每一个探索者，分享宇宙间的奇思妙想</p>
    </header>

    <div class="container">
        <div class="top-bar">
            <div class="tabs">
                <button class="tab active" data-tab="hot">
                    <span class="icon">🔥</span>热门
                </button>
                <button class="tab" data-tab="new">
                    <span class="icon">🆕</span>最新
                </button>
            </div>
            <button class="fab-post" onclick="openModal()">✨ 发布帖子</button>
        </div>

        <div class="posts-list" id="postsList">
            <div class="loading">正在加载帖子...</div>
        </div>
    </div>

    <!-- 发帖弹窗 -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <button class="modal-close" onclick="closeModal()">×</button>
            <div class="modal-title">发布帖子</div>
            <input type="text" class="modal-input" id="modalName" placeholder="你的名字" maxlength="20">
            <input type="text" class="modal-input" id="modalTitle" placeholder="标题" maxlength="50">
            <textarea class="modal-textarea" id="modalContent" placeholder="内容" maxlength="1000"></textarea>
            <button class="modal-submit" id="submitBtn" onclick="submitPost()">发布</button>
        </div>
    </div>

    <script>
        // ==================== JSONBlob 配置 ====================
        const BLOB_ID = '019f2c4c-4c95-7e7c-b44a-781fbd266e23';
        const API_URL = 'https://api.jsonblob.com/' + BLOB_ID;

        // ==================== 数据 ====================
        let posts = [];
        let currentTab = 'hot';
        let likedPosts = JSON.parse(localStorage.getItem('likedPosts')) || {};
        let isLoading = false;

        // ==================== 从云端加载帖子 ====================
        async function loadPosts() {
            isLoading = true;
            try {
                const resp = await fetch(API_URL);
                if (resp.ok) {
                    const data = await resp.json();
                    posts = data.posts || [];
                    renderPosts();
                }
            } catch (err) {
                console.error('加载失败:', err);
                document.getElementById('postsList').innerHTML = '<div class="empty-state"><div class="emoji">⚠️</div><p>加载失败，请检查网络连接</p></div>';
            }
            isLoading = false;
        }

        // ==================== 保存帖子到云端 ====================
        async function savePosts() {
            try {
                await fetch(API_URL, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ posts: posts })
                });
            } catch (err) {
                console.error('保存失败:', err);
            }
        }

        // ==================== 自动刷新（每5秒同步一次） ====================
        setInterval(() => {
            if (!isLoading) loadPosts();
        }, 5000);

        // ==================== 模态框 ====================
        function openModal() {
            document.getElementById('modalOverlay').classList.add('show');
            setTimeout(() => {
                document.getElementById('modalName').focus();
            }, 100);
        }

        function closeModal() {
            document.getElementById('modalOverlay').classList.remove('show');
            document.getElementById('modalName').value = '';
            document.getElementById('modalTitle').value = '';
            document.getElementById('modalContent').value = '';
        }

        document.getElementById('modalOverlay').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') closeModal();
        });

        // ==================== 发帖 ====================
        async function submitPost() {
            const name = document.getElementById('modalName').value.trim();
            const title = document.getElementById('modalTitle').value.trim();
            const content = document.getElementById('modalContent').value.trim();

            if (!name) {
                document.getElementById('modalName').focus();
                return;
            }
            if (!title && !content) {
                document.getElementById('modalTitle').focus();
                return;
            }

            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.textContent = '发布中...';

            const newPost = {
                id: Date.now() + '_' + Math.random().toString(36).substr(2, 9),
                title: title,
                content: content,
                author: name,
                avatar: getRandomAvatar(),
                time: Date.now(),
                likes: 0,
                comments: 0
            };

            // 先读取最新数据，再写入（避免覆盖他人帖子）
            try {
                const resp = await fetch(API_URL);
                const data = await resp.json();
                const currentPosts = data.posts || [];
                currentPosts.unshift(newPost);
                posts = currentPosts;

                const saveResp = await fetch(API_URL, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ posts: posts })
                });

                if (saveResp.ok) {
                    closeModal();
                    currentTab = 'new';
                    updateTabs();
                    renderPosts();
                } else {
                    alert('发布失败，请重试');
                }
            } catch (err) {
                alert('发布失败: ' + err.message);
            }

            btn.disabled = false;
            btn.textContent = '发布';
        }

        // ==================== 点赞 ====================
        async function toggleLike(id) {
            const isLiked = likedPosts[id] || false;

            // 在本地找到帖子并修改
            const post = posts.find(p => p.id === id);
            if (post) {
                post.likes = isLiked ? Math.max(0, (post.likes || 0) - 1) : (post.likes || 0) + 1;
            }

            likedPosts[id] = !isLiked;
            localStorage.setItem('likedPosts', JSON.stringify(likedPosts));
            renderPosts();

            // 同步到云端
            savePosts();
        }

        // ==================== 渲染 ====================
        function renderPosts() {
            const list = document.getElementById('postsList');
            let displayPosts = [...posts];

            if (currentTab === 'hot') {
                displayPosts.sort((a, b) => (b.likes || 0) - (a.likes || 0));
            } else {
                displayPosts.sort((a, b) => (b.time || 0) - (a.time || 0));
            }

            if (displayPosts.length === 0) {
                list.innerHTML = `
                    <div class="empty-state">
                        <div class="emoji">🌌</div>
                        <p>还没有帖子，点击右上角做第一个探索宇宙的人吧</p>
                    </div>
                `;
                return;
            }

            list.innerHTML = displayPosts.map(post => {
                const isLiked = likedPosts[post.id] || false;
                return `
                    <div class="post-card" data-id="${post.id}">
                        <div class="post-header">
                            <div class="post-author">
                                <div class="avatar">${post.avatar}</div>
                                <div class="author-info">
                                    <span class="author-name">${escapeHtml(post.author)}</span>
                                    <span class="post-time">${formatTime(post.time)}</span>
                                </div>
                            </div>
                        </div>
                        ${post.title ? `<div class="post-title">${escapeHtml(post.title)}</div>` : ''}
                        <div class="post-content">${escapeHtml(post.content)}</div>
                        <div class="post-footer">
                            <button class="action-btn ${isLiked ? 'liked' : ''}" onclick="toggleLike('${post.id}')">
                                <span>${isLiked ? '❤️' : '🤍'}</span>
                                <span>${post.likes || 0}</span>
                            </button>
                            <button class="action-btn">
                                <span>💬</span>
                                <span>${post.comments || 0}</span>
                            </button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // ==================== 工具函数 ====================
        function formatTime(timestamp) {
            const now = Date.now();
            const diff = now - timestamp;
            const minute = 60 * 1000;
            const hour = 60 * minute;
            const day = 24 * hour;

            if (diff < minute) return '刚刚';
            if (diff < hour) return Math.floor(diff / minute) + '分钟前';
            if (diff < day) return Math.floor(diff / hour) + '小时前';
            if (diff < 7 * day) return Math.floor(diff / day) + '天前';
            return new Date(timestamp).toLocaleDateString('zh-CN');
        }

        function getRandomAvatar() {
            const avatars = ['🔭', '🚀', '🛸', '🌍', '🌕', '☄️', '✨', '⭐', '🌟', '💫', '🌌', '🔮', '⚛️', '🧬', '🪐', '🌑', '🌞', '🌙'];
            return avatars[Math.floor(Math.random() * avatars.length)];
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function updateTabs() {
            document.querySelectorAll('.tab').forEach(tab => {
                tab.classList.toggle('active', tab.dataset.tab === currentTab);
            });
        }

        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                currentTab = tab.dataset.tab;
                updateTabs();
                renderPosts();
            });
        });

        // ==================== 初始化 ====================
        loadPosts();
    </script>
</body>
</html>
